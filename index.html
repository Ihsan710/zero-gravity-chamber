<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Gravity Chamber</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌌</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>

<body>
    <div id="ui-container">
        <h1>ZERO-GRAVITY CHAMBER</h1>
        <div class="controls">
            <button id="gravity-btn">ACTIVATE ANTI-GRAVITY</button>
            <div class="slider-container">
                <label for="gravity-slider">GRAVITY FORCE</label>
                <input type="range" id="gravity-slider" min="-20" max="20" value="-9.8" step="0.1">
                <span id="gravity-value">-9.8 m/s²</span>
            </div>
            <div class="slider-container">
                <label for="time-slider">TIME SCALE</label>
                <input type="range" id="time-slider" min="0" max="2" value="1" step="0.1">
                <span id="time-value">1.0x</span>
            </div>
            <div class="button-group">
                <button id="chaos-btn" class="secondary-btn">CHAOS MODE</button>
                <button id="reset-btn" class="secondary-btn">RESET OBJECTS</button>
            </div>
        </div>
        <div class="instructions">
            <p>CLICK OBJECTS TO SPIN • SCROLL TO ZOOM • DRAG TO ROTATE</p>
        </div>
